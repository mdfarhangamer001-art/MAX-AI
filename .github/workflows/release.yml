name: MAX AI Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22


    - name: Install Dependencies
      run: npm install


    - name: Get Latest Version
      id: version
      shell: bash
      run: |

        git fetch --tags

        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

        VERSION=${LAST_TAG#v}

        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        PATCH=$((PATCH+1))

        NEW_VERSION="$MAJOR.$MINOR.$PATCH"

        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT


    - name: Update Package Version
      shell: bash
      run: |

        npm version ${{steps.version.outputs.version}} --no-git-tag-version


    - name: Build MAX AI EXE
      run: npm run build


    - name: Create Git Tag
      shell: bash
      run: |

        git config user.name "MAX AI Release Bot"
        git config user.email "actions@github.com"

        git add .
        git commit -m "MAX AI Release v${{steps.version.outputs.version}}" || true

        git tag v${{steps.version.outputs.version}}

        git push origin v${{steps.version.outputs.version}}


    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:

        tag_name: v${{steps.version.outputs.version}}

        name: MAX AI v${{steps.version.outputs.version}}

        body: |

          ## MAX AI Release

          Version:
          v${{steps.version.outputs.version}}

          Release Date:
          ${{github.event.head_commit.timestamp}}

          Automatic build generated by MAX AI CI/CD system.


        files: |

          dist/*.exe

      env:

        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
